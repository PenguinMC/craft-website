<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>CRAFT Admin · Pricing</title>
<link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
<style>
:root {
  --ink: #0A0D12;
  --approach: #14191F;
  --runway: #1A2028;
  --beacon: #E63027;
  --beacon-dark: #B61F18;
  --white: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--ink);
  color: var(--white);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 20px;
  background-image:
    linear-gradient(rgba(230, 48, 39, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(230, 48, 39, 0.05) 1px, transparent 1px);
  background-size: 64px 64px;
}
.card {
  background: var(--approach);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 36px 32px;
  width: 100%;
  max-width: 640px;
  box-shadow: 0 30px 60px -20px rgba(0,0,0,0.5);
  position: relative;
}
.card::before {
  content: "";
  display: block;
  position: absolute;
  left: 0; right: 0; top: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--beacon), transparent);
  border-radius: 12px 12px 0 0;
}
h1 {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.01em;
  text-transform: uppercase;
  margin-bottom: 6px;
  color: var(--white);
}
h1 .accent { color: var(--beacon); }
.subtitle {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  margin-bottom: 28px;
}
.row {
  display: grid;
  grid-template-columns: 1fr 140px;
  gap: 14px;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.row:last-child { border-bottom: none; }
.row label {
  font-size: 14px;
  color: rgba(255,255,255,0.85);
  font-weight: 500;
}
.row label small {
  display: block;
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 2px;
  font-weight: 400;
}
.input-wrap {
  position: relative;
}
.input-wrap::before {
  content: "$";
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(255,255,255,0.45);
  font-size: 14px;
  pointer-events: none;
}
input[type=number],
input[type=password] {
  width: 100%;
  background: var(--runway);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  padding: 10px 12px 10px 26px;
  color: var(--white);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s ease, background 0.15s ease;
}
input[type=password] {
  padding: 14px 16px;
  font-size: 15px;
  letter-spacing: 0.06em;
}
input[type=number]:focus,
input[type=password]:focus {
  border-color: var(--beacon);
  background: rgba(230, 48, 39, 0.06);
}
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }
.section-head {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--beacon);
  margin: 24px 0 6px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(230, 48, 39, 0.2);
  font-weight: 600;
}
.section-head:first-of-type { margin-top: 0; }
.btn {
  display: inline-block;
  width: 100%;
  background: var(--beacon);
  color: var(--white);
  border: none;
  padding: 14px 20px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  cursor: pointer;
  margin-top: 24px;
  transition: background 0.15s ease, transform 0.1s ease;
}
.btn:hover { background: var(--beacon-dark); }
.btn:active { transform: scale(0.98); }
.btn:disabled {
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.4);
  cursor: not-allowed;
  transform: none;
}
.btn-ghost {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.7);
  font-size: 12px;
  padding: 10px 16px;
  margin-top: 16px;
}
.btn-ghost:hover { background: rgba(255,255,255,0.04); color: var(--white); }
.status {
  margin-top: 16px;
  padding: 12px 14px;
  border-radius: 6px;
  font-size: 13px;
  display: none;
}
.status.ok {
  display: block;
  background: rgba(46, 204, 113, 0.1);
  border: 1px solid rgba(46, 204, 113, 0.3);
  color: #b8efc7;
}
.status.err {
  display: block;
  background: rgba(230, 48, 39, 0.1);
  border: 1px solid rgba(230, 48, 39, 0.3);
  color: #ffb3ad;
}
.lock-icon {
  display: block;
  width: 48px;
  height: 48px;
  margin: 0 auto 18px;
  color: var(--beacon);
}
.lock-screen {
  text-align: center;
  padding: 12px 0;
}
.lock-screen .password-row {
  margin: 24px 0 4px;
}
.lock-screen label {
  display: block;
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  margin-bottom: 10px;
  font-weight: 600;
}
.prices-screen { display: none; }
.session-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.05);
  font-size: 12px;
  color: rgba(255,255,255,0.5);
}
.session-row a { color: var(--beacon); cursor: pointer; text-decoration: none; }
.session-row a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">

  <!-- LOCKED SCREEN -->
  <div class="lock-screen" id="lock-screen">
    <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    <h1>CRAFT <span class="accent">Admin</span></h1>
    <p class="subtitle">Enter the admin password to view and edit prices.</p>

    <form id="unlock-form" autocomplete="off">
      <div class="password-row">
        <label for="pw-lock">Admin password</label>
        <input type="password" id="pw-lock" name="pw" required autocomplete="current-password" autofocus>
      </div>
      <button type="submit" class="btn" id="unlock-btn">Unlock</button>
      <div class="status" id="lock-status"></div>
    </form>
  </div>

  <!-- PRICES SCREEN (revealed after unlock) -->
  <div class="prices-screen" id="prices-screen">
    <h1>CRAFT <span class="accent">Admin</span></h1>
    <p class="subtitle">Update prices sitewide.</p>

    <form id="prices-form" autocomplete="off">

      <div class="section-head">Self-Paced Hourly Rates</div>

      <div class="row">
        <label>DA40 NG (wet)<small>per hour</small></label>
        <div class="input-wrap"><input type="number" name="ppl_aircraft_hourly" min="0" max="9999" required></div>
      </div>
      <div class="row">
        <label>DA42-VI NG (wet)<small>per hour</small></label>
        <div class="input-wrap"><input type="number" name="da42_wet_hourly" min="0" max="9999" required></div>
      </div>
      <div class="row">
        <label>CFI &middot; Private Pilot<small>per hour</small></label>
        <div class="input-wrap"><input type="number" name="ppl_cfi_hourly" min="0" max="999" required></div>
      </div>
      <div class="row">
        <label>CFI &middot; Advanced (IFR/CPL/Multi/CFI)<small>per hour</small></label>
        <div class="input-wrap"><input type="number" name="advanced_cfi_hourly" min="0" max="999" required></div>
      </div>
      <div class="row">
        <label>Redbird AATD Sim<small>per hour</small></label>
        <div class="input-wrap"><input type="number" name="sim_hourly" min="0" max="999" required></div>
      </div>

      <div class="section-head">Programs &amp; Packages</div>

      <div class="row">
        <label>Discovery Flight<small>flat fee</small></label>
        <div class="input-wrap"><input type="number" name="discovery_flight" min="0" max="9999" required></div>
      </div>
      <div class="row">
        <label>Accelerated IFR<small>7 days, all-inclusive</small></label>
        <div class="input-wrap"><input type="number" name="accel_ifr" min="0" max="99999" required></div>
      </div>
      <div class="row">
        <label>Accelerated CPL<small>5 days + checkride</small></label>
        <div class="input-wrap"><input type="number" name="accel_cpl" min="0" max="99999" required></div>
      </div>
      <div class="row">
        <label>Accelerated Multi-Engine<small>4 days, DA42-VI NG</small></label>
        <div class="input-wrap"><input type="number" name="accel_multi" min="0" max="99999" required></div>
      </div>
      <div class="row">
        <label>Accelerated CFI<small>10&ndash;12 days</small></label>
        <div class="input-wrap"><input type="number" name="accel_cfi" min="0" max="99999" required></div>
      </div>
      <div class="row">
        <label>Accelerated CFI-I<small>3 days + checkride</small></label>
        <div class="input-wrap"><input type="number" name="accel_cfii" min="0" max="99999" required></div>
      </div>
      <div class="row">
        <label>Accelerated MEI<small>3 days + checkride</small></label>
        <div class="input-wrap"><input type="number" name="accel_mei" min="0" max="99999" required></div>
      </div>

      <button type="submit" class="btn" id="save-btn">Save &amp; deploy</button>

      <div class="status" id="status"></div>

      <div class="session-row">
        <span>Authenticated session</span>
        <a id="logout">Lock</a>
      </div>
    </form>
  </div>

</div>
